<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Asif Bhuiyan - portfolio entry point for all GitHub Pages endpoints.">
    <title>Asif | GitHub Pages Hub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="page">
        <section class="hero">
            <p class="eyebrow">asbou45115.github.io</p>
            <h1>Asif Bhuiyan</h1>
            <p class="intro">
                Computer Science student building small products, simulations, and experiments.
                This page is the central index for all published GitHub Pages endpoints.
            </p>
            <div class="hero-links">
                <a href="https://github.com/asbou45115" target="_blank" rel="noopener noreferrer">GitHub</a>

            </div>
        </section>

        <section class="endpoints">
            <div class="section-header">
                <h2>Published Endpoints</h2>
                <button id="refreshButton" type="button">Refresh</button>
            </div>
            <p class="section-note">
                Auto-loaded from public repositories with GitHub Pages enabled.
            </p>
            <div id="statusMessage" role="status" aria-live="polite"></div>
            <ul id="endpointsList" class="endpoint-list"></ul>
        </section>

    <script src="script.js"></script>

</html>
